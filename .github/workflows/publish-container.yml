name: Publish Container Image

on:
  workflow_dispatch:
    inputs:
      image_name:
        description: "Image name in GHCR (without owner), e.g. aws-assistant-toolkit"
        required: true
        default: "aws-assistant-toolkit"

jobs:
  publish-container:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Check for Dockerfile
        id: dockerfile_check
        run: |
          if [ -f Dockerfile ]; then
            echo "exists=true" >> "$GITHUB_OUTPUT"
          else
            echo "exists=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Warn and stop when Dockerfile missing
        if: steps.dockerfile_check.outputs.exists != 'true'
        run: |
          echo "No Dockerfile found in repository root."
          echo "Add a production Dockerfile, then rerun this workflow."
          exit 1

      - name: Log in to GHCR
        if: steps.dockerfile_check.outputs.exists == 'true'
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push image
        if: steps.dockerfile_check.outputs.exists == 'true'
        env:
          IMAGE: ghcr.io/${{ github.repository_owner }}/${{ inputs.image_name }}
        run: |
          docker build -t "$IMAGE:latest" .
          docker push "$IMAGE:latest"
